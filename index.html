<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rushion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow-x: hidden;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-top: 20px;
            z-index: 10;
            max-width: 600px;
        }

        header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            font-weight: normal;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 5px rgba(0, 0, 0, 0.5));
            letter-spacing: 2px;
        }

        .sub-header {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-top: 8px;
            font-weight: 400;
            line-height: 1.4;
        }

        .deck-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 550px;
            margin: 30px auto;
            perspective: 1000px;
        }

        .revolver-cylinder {
            position: absolute;
            top: -25px;
            left: -25px;
            width: 80px;
            height: 80px;
            z-index: 20;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.4));
            transform-origin: center center;
            pointer-events: none;
        }

        .revolver-cylinder.spin {
            animation: cylinderSpin 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes cylinderSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(720deg); }
        }

        .birthday-card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-size: cover;
            background-position: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.6s ease;
            opacity: 0;
            transform: translateX(100%) rotate(10deg);
            pointer-events: none;
            color: #2c2c2c;
        }

        .birthday-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.82);
            border-radius: 20px;
            z-index: 1;
        }

        .birthday-card.active {
            opacity: 1;
            transform: translateX(0) rotate(0deg);
            pointer-events: auto;
            z-index: 3;
        }

        .birthday-card.previous {
            opacity: 0;
            transform: translateX(-100%) rotate(-10deg);
            pointer-events: none;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-y: auto;
            padding-bottom: 10px;
            padding-top: 35px;
            width: 100%;
        }

        .image-gallery {
            display: flex;
            gap: 12px;
            width: 100%;
            overflow-x: auto;
            padding: 5px 0 15px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .image-gallery::-webkit-scrollbar {
            height: 6px;
        }
        .image-gallery::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .content-image {
            max-width: 95%;
            width: 260px;
            height: 230px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            object-fit: contain;
            background: rgba(0, 0, 0, 0.03);
            flex-shrink: 0;
            scroll-snap-align: center;
        }

        .single-image {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .message-text {
            font-size: 1.05rem;
            line-height: 1.5;
            font-style: italic;
            margin-bottom: 10px;
            width: 100%;
            white-space: pre-line; /* Keeps line breaks from copy-pasted text */
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .card-footer {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 12px;
            width: 100%;
            min-height: 45px;
        }

        .sender-name {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: #aa771c;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            z-index: 10;
        }

        .btn {
            background: none;
            border: 2px solid transparent;
            border-image: var(--gold-gradient) 1;
            color: #fff;
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--gold-gradient);
            color: #000;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            header h1 { font-size: 2.8rem; }
            .sub-header { font-size: 0.75rem; letter-spacing: 1px; }
            .deck-container { height: 500px; }
            .revolver-cylinder { width: 65px; height: 65px; top: -15px; left: -15px; }
            .content-image { height: 190px; width: 220px; }
            .message-text { font-size: 0.95rem; }
            .sender-name { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Happy Birthday Rushion</h1>
        <div class="sub-header">To more happy upcoming years together with you we roll the pistol RUSH2001</div>
    </header>

    <div class="deck-container" id="deck">
        <img src="resources/pistol.png" alt="Revolver Cylinder" class="revolver-cylinder" id="cylinderIcon">
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn">Back</button>
        <button class="btn" id="nextBtn">Next</button>
    </div>

    <script>
        const cardData = [
            {
                bgImage: "https://images.unsplash.com/photo-1513151233558-d860c5398176?w=500",
                cardImages: ["resources/kas.png"],
                voiceUrl: "",  
                message: "",
                senderName: "Kastiel"
            },
            {
                bgImage: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500",
                cardImages: ["resources/bomba.png"], 
                voiceUrl: "",
                message: "",
                senderName: "aiko"
            },
            {
                bgImage: "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=500",
                cardImages: [], 
                voiceUrl: "resources/pizza.mp3", 
                message: "Press play to listen:",
                senderName: "dough"
            },
            {
                bgImage: "https://images.unsplash.com/photo-1513151233558-d860c5398176?w=500",
                cardImages: ["resources/vic1.gif", "resources/vic2.gif"],
                voiceUrl: "",  
                message: "Happy 25th birthday rush your getting old lol i hope you have a good day tho I don't really know what to say tbh. Ik we didn't talk much in the past but thanks for everything man from bringing us together in avallon to being a good friend I hope this day is good for you  I hope life will be kind to you i also hope you succeed in life in the future have a great day rush .",
                senderName: "victor"
            },
            {
                bgImage: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500",
                cardImages: [
                    "resources/aish1.png", 
                    "resources/aish2.png", 
                    "resources/aish3.png", 
                    "resources/aish4.png", 
                    "resources/aish5.png", 
                    "resources/aish6.png", 
                    "resources/aish7.png"
                ],
                voiceUrl: "",  
                message: "Swipe across to view all images!",
                senderName: "aish"
            },
            {
                bgImage: "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=500",
                cardImages: [],
                voiceUrl: "",  
                message: "Happy birthday rush! I hope you’re doing well! We haven’t talked in a while but I wanted you to know that I am happy for you and how far you have come and grown and you are strong,brave guy! We all love you very much so enjoy your birthday celebration! 25!! Wow hahah very old but getting old is a blessing.\nLet’s talk soon! Love ya",
                senderName: "yumi"
            },
            {
                bgImage: "https://images.unsplash.com/photo-1513151233558-d860c5398176?w=500",
                cardImages: ["resources/sky.png"],
                voiceUrl: "",  
                message: "Happy birthday Rush. Here’s to hoping this one is your best yet. I have enjoyed all the discussions we have had, funny moments, and so much more over the past few months. I wish I would’ve known you for longer, but regardless I am happy to have seen you improve and grow in handling everything both in Avallon and as a person. \n\nI’d have to admit I’m surprised to find out you’re turning 25 this year as I thought you were a few years younger, but as with age comes wisdom and experiences which shape you and the world you see. \n\nP.S… I’m still waiting on that discussion room. \n\nHere’s my favorite quote from you ❤️‍🩹 .",
                senderName: "skyvier"
            },
            {
                bgImage: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500",
                cardImages: [],
                voiceUrl: "",  
                message: "Russian Roulette is not the same without a gun and Avallonion will never be the same with you gone",
                senderName: "" // Collective final card, left blank
            }
        ];

        let currentIndex = 0;
        const deck = document.getElementById('deck');
        const cylinderIcon = document.getElementById('cylinderIcon');

        function createDeck() {
            cardData.forEach((data, index) => {
                const card = document.createElement('div');
                card.classList.add('birthday-card');
                if (index === 0) card.classList.add('active');
                
                card.style.backgroundImage = `url('${data.bgImage}')`;

                let contentHTML = `<div class="card-content">`;
                
                if (data.cardImages && data.cardImages.length > 0) {
                    if (data.cardImages.length === 1) {
                        contentHTML += `<img src="${data.cardImages[0]}" class="single-image" alt="Visual">`;
                    } else {
                        contentHTML += `<div class="image-gallery">`;
                        data.cardImages.forEach(imgUrl => {
                            contentHTML += `<img src="${imgUrl}" class="content-image" alt="Gallery Visual">`;
                        });
                        contentHTML += `</div>`;
                    }
                }
                
                if (data.message && data.message.trim() !== "") {
                    contentHTML += `<p class="message-text">${data.message}</p>`;
                }
                
                if (data.voiceUrl && data.voiceUrl.trim() !== "") {
                    contentHTML += `<audio controls><source src="${data.voiceUrl}" type="audio/mpeg"></audio>`;
                }
                
                contentHTML += `</div>`;

                // Render footer block only if there is a username
                let footerHTML = '';
                if (data.senderName && data.senderName.trim() !== "") {
                    footerHTML = `
                        <div class="card-footer">
                            <span class="sender-name">${data.senderName}</span>
                        </div>
                    `;
                } else {
                    footerHTML = `<div class="card-footer" style="border-top:none;"></div>`;
                }

                card.innerHTML = contentHTML + footerHTML;
                deck.appendChild(card);
            });
        }

        function spinCylinder() {
            cylinderIcon.classList.remove('spin');
            void cylinderIcon.offsetWidth; 
            cylinderIcon.classList.add('spin');
        }

        function updateCards() {
            const cards = document.querySelectorAll('.birthday-card');
            spinCylinder();

            cards.forEach((card, index) => {
                card.classList.remove('active', 'previous');
                if (index === currentIndex) {
                    card.classList.add('active');
                } else if (index < currentIndex) {
                    card.classList.add('previous');
                }
                if (index !== currentIndex) {
                    const audio = card.querySelector('audio');
                    if(audio) audio.pause();
                }
            });
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex = (currentIndex < cardData.length - 1) ? currentIndex + 1 : 0;
            updateCards();
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCards();
            }
        });

        createDeck();
    </script>
</body>
</html>
